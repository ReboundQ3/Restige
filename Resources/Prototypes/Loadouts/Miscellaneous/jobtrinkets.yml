# Job-specific trinkets

- type: loadout
  id: JanitorGoldenPlunger
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorJanitorial
  storage:
    back:
    - GoldenPlunger

- type: loadout
  id: FlowerWaterClown
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobClown
      time: 4h
  storage:
    back:
    - SprayFlowerPin

